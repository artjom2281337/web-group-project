<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reservation.css">
    <link rel="stylesheet" href="styles.css">
    <title>Pizza house</title>
</head>
<body>
    <nav>
        <div class="left">
            <a href="index.html">
                <img src="images/icon.png" alt="pizza icon">
                <h1>
                    <span>PIZZA HOUSE</span>
                </h1>
            </a>
        </div>
        <div class="right">
            <a href="reservation.html">
                <span>Reservation</span>
            </a>  
            <a href="order.html">
                <span>Orders</span>
            </a>
        </div>
    </nav>
    <main><div></div></main>
        <div class="person">
            <h1>Book a table in Pizza House</h1>
            <input type="text" name="name" id="name" placeholder="Name">
            <input type="email" name="email" id="email" placeholder="Email">
            <input type="tel" name="phone" id="phone" placeholder="Phone">
            <input type="date" name="date" id="date" placeholder="Date">
            <input type="number" name="guests" id="guests" placeholder="Number of Guests">
            <button onclick="returnTimes()">Book Now</button>
        </div>

        <div class="table"> 
            <h2 id="table-h2"></h2>
            <p id="table"></p>
        </div>

        <div class="person-details">
            <p id="details"></p>
        </div>
    <script src="reservation.js"></script>
    <script src="index.js"></script>
</body>
</html>
